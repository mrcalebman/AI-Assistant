<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Caleb Alexandre Nelson</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #080810;
    overscroll-behavior: none;
    overflow: hidden;
    height: 100%;
    width: 100%;
  }
  #c {
    display: block;
    width: 100%; height: 100%;
  }
  .back-btn {
    position: fixed; top: 1.2rem; left: 1.5rem; z-index: 20;
    color: rgba(255,255,255,0.6); font-size: 0.8rem;
    text-decoration: none; font-family: -apple-system, sans-serif;
    letter-spacing: 0.05em;
  }
  .back-btn:hover { color: white; }
  #hover-label {
    position: fixed; z-index: 30;
    background: rgba(10,10,20,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 0.4rem 0.85rem;
    color: white;
    font-size: 0.78rem;
    font-family: -apple-system, sans-serif;
    pointer-events: none;
    display: none;
    white-space: nowrap;
  }
  #detail {
    position: fixed; inset: 0; z-index: 50;
    background: #0d0d18;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #detail .detail-inner {
    max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 4rem;
  }
  #detail img {
    width: 100%; border-radius: 12px; margin-bottom: 1.5rem;
    display: block;
  }
  #detail h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.75rem; }
  .meta-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem 1.5rem; margin-bottom: 1.5rem;
  }
  .meta-item .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); }
  .meta-item .val { font-size: 0.9rem; color: rgba(255,255,255,0.85); }
  #detail .body-text { font-size: 0.95rem; line-height: 1.7; color: rgba(255,255,255,0.65); }
  #close-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white; border-radius: 999px;
    padding: 0.6rem 1.4rem; font-size: 0.85rem;
    cursor: pointer; margin-bottom: 2rem;
    font-family: inherit;
  }
  #close-btn:hover { background: rgba(255,255,255,0.14); }
  #hint {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.35); font-size: 0.75rem;
    font-family: -apple-system, sans-serif;
    pointer-events: none;
    transition: opacity 1s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<a class="back-btn" href="index.html">← Home</a>
<div id="hover-label"></div>
<div id="detail"></div>
<div id="hint">Drag to explore · Click a card to open</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function(){
  const canvas = document.getElementById('c');
  const W = window.innerWidth, H = window.innerHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(W, H);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, W/H, 0.1, 200);
  camera.position.set(0, 0, 0.001);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dLight.position.set(5, 10, 5);
  scene.add(dLight);

  // Cards data — titles from Caleb's real work
  const cardData = [
    { title: '240 E Ross St', sub: 'Active Remodel · Lancaster PA', seed: 1 },
    { title: 'Kitchen Remodel', sub: 'High-End Residential', seed: 2 },
    { title: 'Bathroom Renovation', sub: 'Design-Build', seed: 3 },
    { title: 'Full Home Remodel', sub: 'RHR Flagship', seed: 4 },
    { title: 'Operational Success', sub: 'WIG: 60% → 80%', seed: 5 },
    { title: 'Project Closeout', sub: 'Zero Callbacks', seed: 6 },
    { title: 'Crew Leadership', sub: 'Josh N. & Josh J.', seed: 7 },
    { title: 'Subcontractor Mgmt', sub: 'VZ Painting · JLR Mechanical', seed: 8 },
    { title: 'Phase Inspection', sub: 'Quality Cadence', seed: 9 },
    { title: 'Design Handoff', sub: 'Joel → Caleb Pipeline', seed: 10 },
    { title: 'Carpentry Craft', sub: '5+ Years Experience', seed: 11 },
    { title: 'Schedule Tracking', sub: 'On-Time Delivery', seed: 12 },
    { title: 'Client Walkthrough', sub: 'Final Approval', seed: 13 },
    { title: 'Punch List', sub: 'Pre-Closeout Checklist', seed: 14 },
    { title: 'House Flip', sub: 'Schedule Fill Strategy', seed: 15 },
    { title: 'Team Training', sub: 'Building Craftsmen', seed: 16 },
    { title: '4DX Methodology', sub: 'Execution Framework', seed: 17 },
    { title: 'Profit Margin', sub: 'Key Metric', seed: 18 },
    { title: 'Revenue Tracking', sub: 'Total Revenue KPI', seed: 19 },
    { title: 'RHR Brand', sub: 'Redemption Home Remodeling', seed: 20 },
    { title: 'Panel Swap', sub: 'Electrical Sub', seed: 21 },
    { title: 'Francisco Drywall', sub: 'Drywall Sub', seed: 22 },
    { title: 'Framing Stage', sub: 'Build Phase', seed: 23 },
    { title: 'Painting Stage', sub: 'Current: 240 E Ross St', seed: 24 },
    { title: 'Plumbing Rough-In', sub: 'JLR Mechanical', seed: 25 },
    { title: 'Electrical Rough-In', sub: 'Panel Swap', seed: 26 },
    { title: 'Tile Work', sub: 'Bathroom & Kitchen', seed: 27 },
    { title: 'Cabinet Install', sub: 'Kitchen Phase', seed: 28 },
    { title: 'Trim & Millwork', sub: 'Lead Carpenter', seed: 29 },
    { title: 'Flooring', sub: 'High-End Finish', seed: 30 },
    { title: 'Lighting', sub: 'Fixture Install', seed: 31 },
    { title: 'Countertops', sub: 'Kitchen & Bath', seed: 32 },
    { title: 'Exterior Work', sub: 'Curb Appeal', seed: 33 },
    { title: 'Demo Phase', sub: 'Project Start', seed: 34 },
    { title: 'Structural Work', sub: 'Foundation Up', seed: 35 },
    { title: 'Project Kickoff', sub: 'Day One Standard', seed: 36 },
    { title: 'Material Ordering', sub: 'Supply Chain', seed: 37 },
    { title: 'Budget Tracking', sub: 'Project Finance', seed: 38 },
    { title: 'Change Orders', sub: 'Scope Management', seed: 39 },
    { title: 'Caleb A. Nelson', sub: 'PM & Lead Carpenter', seed: 40 },
    { title: 'Lancaster PA', sub: 'Home Territory', seed: 41 },
    { title: 'Business Degree', sub: 'Foundation', seed: 42 },
    { title: 'Church Leadership', sub: 'Deacon & Leader', seed: 43 },
    { title: 'Pre-Build Meeting', sub: 'Subcontractor Alignment', seed: 44 },
    { title: 'Joel — Sales', sub: 'Owner / Sales Manager', seed: 45 },
    { title: 'Daily Site Walk', sub: 'PM Ritual', seed: 46 },
    { title: 'End-of-Phase Check', sub: 'Quality Gate', seed: 47 },
    { title: 'Photo Documentation', sub: 'Before & After', seed: 48 },
    { title: 'Client Communication', sub: 'Weekly Updates', seed: 49 },
    { title: 'Subcontractor Bid', sub: 'Scope & Price', seed: 50 },
    { title: 'RHR Pipeline', sub: '3-4 Active Jobs', seed: 51 },
    { title: 'Q3 Goal', sub: 'Ross St by July 1', seed: 52 },
    { title: 'Q4 Goal', sub: '80% Operational Success', seed: 53 },
    { title: 'Craft Standard', sub: 'Callback-Free Delivery', seed: 54 },
    { title: 'High-End Remodel', sub: '$30k–$100k+ Projects', seed: 55 },
    { title: 'Apprenticeship', sub: 'Building the Next Crew', seed: 56 },
    { title: 'Systems Thinking', sub: 'Inspection → Results', seed: 57 },
    { title: 'Project Timeline', sub: 'Phase Scheduling', seed: 58 },
    { title: 'RHR Growth', sub: 'Building Stage 2026', seed: 59 },
    { title: 'Finish Work', sub: 'The Final 10%', seed: 60 },
  ];

  const R = 22;
  const ROWS = 6;
  const cards = [];
  const meshes = [];

  cardData.forEach((d, i) => {
    const row = Math.floor(i / Math.ceil(cardData.length / ROWS));
    const total = Math.ceil(cardData.length / ROWS);
    const phi = (Math.PI * (row + 0.5)) / ROWS;
    const rowCount = Math.ceil(cardData.length / ROWS);
    const theta = (2 * Math.PI * (i % rowCount)) / rowCount + (row % 2) * (Math.PI / rowCount);

    const x = R * Math.sin(phi) * Math.cos(theta);
    const y = R * Math.cos(phi);
    const z = R * Math.sin(phi) * Math.sin(theta);

    // card texture
    const tc = document.createElement('canvas'); tc.width = 640; tc.height = 480;
    const tctx = tc.getContext('2d');
    tctx.fillStyle = '#1a1a2e'; tctx.fillRect(0,0,640,480);

    const cardGeo = new THREE.PlaneGeometry(3.2, 2.4);
    const cardMat = new THREE.MeshStandardMaterial({
      map: new THREE.CanvasTexture(tc),
      roughness: 0.6, metalness: 0.1,
      side: THREE.FrontSide
    });

    // Load image async
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      tctx.drawImage(img, 0, 0, 640, 480);
      // overlay
      const grad = tctx.createLinearGradient(0,320,0,480);
      grad.addColorStop(0,'rgba(0,0,0,0)');
      grad.addColorStop(1,'rgba(0,0,0,0.85)');
      tctx.fillStyle = grad; tctx.fillRect(0,0,640,480);
      tctx.font = 'bold 36px -apple-system,sans-serif';
      tctx.fillStyle = 'white';
      tctx.fillText(d.title, 20, 446);
      cardMat.map.needsUpdate = true;
    };
    img.onerror = () => {
      tctx.fillStyle = '#22223a'; tctx.fillRect(0,0,640,480);
      tctx.font = 'bold 36px -apple-system,sans-serif';
      tctx.fillStyle = 'white'; tctx.textAlign = 'center';
      tctx.fillText(d.title, 320, 240);
      cardMat.map.needsUpdate = true;
    };
    img.src = `https://picsum.photos/seed/${d.seed}/640/480`;

    const mesh = new THREE.Mesh(cardGeo, cardMat);
    mesh.position.set(x, y, z);
    mesh.lookAt(0, 0, 0);
    mesh.rotateY(Math.PI); // face inward
    scene.add(mesh);
    meshes.push(mesh);
    cards.push({ mesh, data: d, origScale: new THREE.Vector3(1,1,1) });
  });

  // ─── INTERACTION ─────────────────────────────────────────────────────────
  let yaw = 0, pitch = 0;
  let targetYaw = 0, targetPitch = 0;
  let velYaw = 0, velPitch = 0;
  let isDragging = false, dragStartX = 0, dragStartY = 0, dragMoved = false;
  let mouseX = 0, mouseY = 0, mouseMoved = false;
  const hoverLabel = document.getElementById('hover-label');
  const hint = document.getElementById('hint');

  setTimeout(() => { hint.style.opacity = '0'; }, 4000);

  // DETAIL PAGE
  const detail = document.getElementById('detail');
  let detailOpen = false;
  let hoveredMesh = null;

  function openDetail(card) {
    detailOpen = true;
    const d = card.data;
    detail.innerHTML = `<div class="detail-inner">
      <button id="close-btn">← Back to Gallery</button>
      <img src="https://picsum.photos/seed/${d.seed}/900/500" alt="${d.title}" loading="lazy">
      <h2>${d.title}</h2>
      <div class="meta-grid">
        <div class="meta-item"><div class="label">Category</div><div class="val">${d.sub}</div></div>
        <div class="meta-item"><div class="label">Company</div><div class="val">Redemption Home Remodeling</div></div>
        <div class="meta-item"><div class="label">PM</div><div class="val">Caleb Alexandre Nelson</div></div>
        <div class="meta-item"><div class="label">Location</div><div class="val">Lancaster, PA</div></div>
      </div>
      <p class="body-text">
        Part of Caleb's active work at Redemption Home Remodeling — a residential design-and-build company
        focused on higher-end remodels in Lancaster, PA. Every project is held to RHR's operational
        success standard: on-schedule delivery with zero callbacks in the first four weeks.
        Caleb leads the build phase from design handoff to final client walkthrough.
      </p>
    </div>`;
    // CRITICAL: set initial state before animating
    gsap.set(detail, { y: 0, yPercent: 100 });
    detail.style.display = 'block';
    gsap.to(detail, { yPercent: 0, duration: 0.45, ease: 'power3.out' });
    document.getElementById('close-btn').addEventListener('click', closeDetail);
  }

  function closeDetail() {
    gsap.to(detail, {
      yPercent: 100, duration: 0.35, ease: 'power3.in',
      onComplete: () => { detail.style.display = 'none'; detailOpen = false; }
    });
  }

  // Init detail hidden
  detail.style.display = 'none';

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && detailOpen) closeDetail();
  });

  // Mouse events
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragMoved = false;
    velYaw = 0; velPitch = 0;
  });
  canvas.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    if (!mouseMoved) mouseMoved = true;
    if (isDragging) {
      const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
      targetYaw -= dx * 0.004;
      targetPitch -= dy * 0.004;
      targetPitch = Math.max(-1.2, Math.min(1.2, targetPitch));
      velYaw = -dx * 0.004;
      velPitch = -dy * 0.004;
      dragStartX = e.clientX; dragStartY = e.clientY;
    }
  });
  canvas.addEventListener('mouseup', e => {
    if (!dragMoved && !detailOpen) {
      // check click
      const rect = canvas.getBoundingClientRect();
      const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
      );
      const ray = new THREE.Raycaster();
      ray.setFromCamera(mouse, camera);
      const hits = ray.intersectObjects(meshes);
      if (hits.length > 0) {
        const card = cards.find(c => c.mesh === hits[0].object);
        if (card) openDetail(card);
      }
    }
    isDragging = false;
  });
  canvas.addEventListener('mouseleave', () => { isDragging = false; });

  // Touch events
  let touchStartX = 0, touchStartY = 0, touchMoved = false;
  canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
    velYaw = 0; velPitch = 0;
  }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) touchMoved = true;
    targetYaw -= dx * 0.004;
    targetPitch -= dy * 0.004;
    targetPitch = Math.max(-1.2, Math.min(1.2, targetPitch));
    velYaw = -dx * 0.004;
    velPitch = -dy * 0.004;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  // CRITICAL: wheel with {passive:false} and preventDefault; skip when detail open
  window.addEventListener('wheel', e => {
    if (detailOpen) return; // let detail page scroll
    e.preventDefault();
    targetYaw -= e.deltaX * 0.003;
    targetPitch -= e.deltaY * 0.003;
    targetPitch = Math.max(-1.2, Math.min(1.2, targetPitch));
  }, { passive: false });

  // Raycaster for hover
  const raycaster = new THREE.Raycaster();
  const mouse2 = new THREE.Vector2();
  let hoverCard = null;

  function render() {
    requestAnimationFrame(render);

    // Inertia
    if (!isDragging) {
      targetYaw += velYaw * 0.92;
      targetPitch += velPitch * 0.92;
      velYaw *= 0.88;
      velPitch *= 0.88;
      targetPitch = Math.max(-1.2, Math.min(1.2, targetPitch));
    }

    yaw += (targetYaw - yaw) * 0.1;
    pitch += (targetPitch - pitch) * 0.1;

    // Rotate scene group equivalent — rotate camera's quaternion
    const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
    const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), pitch);
    camera.quaternion.copy(qYaw).multiply(qPitch);

    // Hover detection — only after first real mousemove
    if (mouseMoved && !isDragging && !detailOpen) {
      const rect = canvas.getBoundingClientRect();
      mouse2.x = ((mouseX - rect.left) / rect.width) * 2 - 1;
      mouse2.y = -((mouseY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse2, camera);
      const hits = raycaster.intersectObjects(meshes);
      if (hits.length > 0) {
        const card = cards.find(c => c.mesh === hits[0].object);
        if (card !== hoverCard) {
          if (hoverCard) gsap.to(hoverCard.mesh.scale, { x:1,y:1,z:1, duration:0.2 });
          hoverCard = card;
          gsap.to(card.mesh.scale, { x:1.12,y:1.12,z:1.12, duration:0.2 });
        }
        hoverLabel.style.display = 'block';
        hoverLabel.textContent = card.data.title;
        hoverLabel.style.left = (mouseX + 14) + 'px';
        hoverLabel.style.top = (mouseY - 10) + 'px';
        canvas.style.cursor = 'pointer';
      } else {
        if (hoverCard) {
          gsap.to(hoverCard.mesh.scale, { x:1,y:1,z:1, duration:0.2 });
          hoverCard = null;
        }
        hoverLabel.style.display = 'none';
        canvas.style.cursor = 'grab';
      }
    }

    renderer.render(scene, camera);
  }
  render();

  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w/h; camera.updateProjectionMatrix();
    renderer.setSize(w,h);
  });
})();
</script>
</body>
</html>
